services:
  - type: web
    name: stockflow-mvp
    runtime: node
    buildCommand: |
      cd client && npm install && npm run build
      cd ../server && npm install && npx prisma generate
    startCommand: cd server && npx prisma migrate deploy && npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: stockflow-db
    plan: free
    databaseName: stockflow
